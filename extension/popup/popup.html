<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                width: 340px;
                min-height: 200px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #1a1a2e;
                color: #e0e0e0;
            }
            .header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 16px;
                background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            }
            .header-icon {
                font-size: 26px;
            }
            .header-text h1 {
                font-size: 17px;
                font-weight: 700;
                color: #fff;
            }
            .header-text p {
                font-size: 11px;
                color: #888;
                margin-top: 2px;
            }
            .main {
                padding: 16px;
            }
            .section {
                margin-bottom: 16px;
            }
            .section-title {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #888;
                margin-bottom: 10px;
            }
            .auth-prompt {
                text-align: center;
                padding: 20px 16px;
                background: rgba(255, 255, 255, 0.03);
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.06);
            }
            .auth-prompt-icon {
                font-size: 40px;
                margin-bottom: 12px;
            }
            .auth-prompt-text {
                font-size: 13px;
                color: #bbb;
                margin-bottom: 16px;
                line-height: 1.5;
            }
            .user-card {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px;
                background: rgba(255, 255, 255, 0.04);
                border-radius: 10px;
            }
            .user-avatar {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                object-fit: cover;
                border: 2px solid #e94560;
            }
            .user-info {
                flex: 1;
                min-width: 0;
            }
            .user-name {
                font-size: 14px;
                font-weight: 600;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .user-status {
                font-size: 11px;
                color: #81c784;
                margin-top: 2px;
            }
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 10px 16px;
                border: none;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.15s;
                text-decoration: none;
            }
            .btn-primary {
                width: 100%;
                background: linear-gradient(135deg, #e94560, #c23152);
                color: #fff;
            }
            .btn-primary:hover {
                opacity: 0.9;
                transform: translateY(-1px);
            }
            .btn-secondary {
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: #ddd;
                padding: 6px 12px;
                font-size: 12px;
            }
            .btn-secondary:hover {
                background: rgba(255, 255, 255, 0.1);
                color: #fff;
            }
            .btn-tracked {
                width: 100%;
                background: rgba(76, 175, 80, 0.15);
                border: 1px solid rgba(76, 175, 80, 0.3);
                color: #81c784;
            }
            .btn-tracked:hover {
                background: rgba(233, 69, 96, 0.15);
                border-color: rgba(233, 69, 96, 0.3);
                color: #ef9a9a;
            }
            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }
            .stats-card {
                padding: 14px;
                background: rgba(255, 255, 255, 0.04);
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.06);
            }
            .stats-row {
                display: flex;
                gap: 12px;
                margin-bottom: 12px;
            }
            .stat-item {
                flex: 1;
                text-align: center;
                padding: 10px;
                background: rgba(255, 255, 255, 0.03);
                border-radius: 8px;
            }
            .stat-value {
                font-size: 22px;
                font-weight: 700;
                color: #fff;
            }
            .stat-label {
                font-size: 10px;
                color: #888;
                margin-top: 4px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .stats-saved {
                text-align: center;
                padding: 12px;
                background: linear-gradient(
                    135deg,
                    rgba(76, 175, 80, 0.1),
                    rgba(129, 199, 132, 0.05)
                );
                border-radius: 8px;
                border: 1px solid rgba(76, 175, 80, 0.2);
            }
            .stats-saved-value {
                font-size: 26px;
                font-weight: 700;
                color: #81c784;
            }
            .stats-saved-label {
                font-size: 11px;
                color: #a5d6a7;
                margin-top: 2px;
            }
            .stats-best-deal {
                margin-top: 12px;
                padding: 10px;
                background: rgba(255, 193, 7, 0.08);
                border-radius: 8px;
                border: 1px solid rgba(255, 193, 7, 0.2);
            }
            .stats-best-title {
                font-size: 11px;
                color: #ffd54f;
                font-weight: 600;
                margin-bottom: 6px;
            }
            .stats-best-name {
                font-size: 12px;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .stats-best-saved {
                font-size: 11px;
                color: #81c784;
                margin-top: 4px;
            }
            .product-card {
                padding: 12px;
                background: rgba(255, 255, 255, 0.04);
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.06);
            }
            .product-platform {
                display: inline-block;
                padding: 3px 8px;
                border-radius: 4px;
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }
            .product-platform.wb {
                background: rgba(203, 17, 171, 0.2);
                color: #e940c5;
            }
            .product-platform.ozon {
                background: rgba(0, 91, 255, 0.2);
                color: #0088ff;
            }
            .product-name {
                font-size: 13px;
                font-weight: 500;
                color: #fff;
                line-height: 1.4;
                margin-bottom: 8px;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .product-price {
                font-size: 18px;
                font-weight: 700;
                color: #e94560;
                margin-bottom: 10px;
            }
            .product-price-old {
                font-size: 13px;
                color: #666;
                text-decoration: line-through;
                margin-left: 8px;
                font-weight: 400;
            }
            .product-actions {
                display: flex;
                gap: 8px;
            }
            .product-actions .btn {
                flex: 1;
            }
            .not-marketplace {
                text-align: center;
                padding: 16px;
                background: rgba(255, 255, 255, 0.02);
                border-radius: 10px;
                border: 1px dashed rgba(255, 255, 255, 0.1);
            }
            .not-marketplace-icon {
                font-size: 32px;
                margin-bottom: 8px;
                opacity: 0.5;
            }
            .not-marketplace-text {
                font-size: 12px;
                color: #666;
            }
            .tracked-list {
                max-height: 240px;
                overflow-y: auto;
            }
            .tracked-item {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 10px;
                background: rgba(255, 255, 255, 0.03);
                border-radius: 8px;
                margin-bottom: 6px;
                transition: background 0.15s;
            }
            .tracked-item:hover {
                background: rgba(255, 255, 255, 0.06);
            }
            .tracked-item-platform {
                flex-shrink: 0;
                width: 36px;
                height: 36px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
            }
            .tracked-item-platform.wb {
                background: rgba(203, 17, 171, 0.15);
            }
            .tracked-item-platform.ozon {
                background: rgba(0, 91, 255, 0.15);
            }
            .tracked-item-info {
                flex: 1;
                min-width: 0;
            }
            .tracked-item-name {
                font-size: 12px;
                color: #ddd;
                line-height: 1.3;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 4px;
            }
            .tracked-item-price {
                font-size: 13px;
                font-weight: 700;
                color: #e94560;
            }
            .tracked-item-delete {
                flex-shrink: 0;
                width: 24px;
                height: 24px;
                border: none;
                background: transparent;
                color: #666;
                font-size: 16px;
                cursor: pointer;
                border-radius: 4px;
                transition: all 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .tracked-item-delete:hover {
                background: rgba(233, 69, 96, 0.2);
                color: #ef9a9a;
            }
            .empty-state {
                text-align: center;
                padding: 20px;
                color: #666;
                font-size: 13px;
            }
            .empty-state-icon {
                font-size: 28px;
                margin-bottom: 8px;
                opacity: 0.4;
            }
            .loader {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 20px;
                color: #888;
                font-size: 13px;
            }
            .spinner {
                width: 16px;
                height: 16px;
                border: 2px solid rgba(255, 255, 255, 0.1);
                border-top-color: #e94560;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .error-msg {
                padding: 10px 12px;
                background: rgba(233, 69, 96, 0.12);
                border: 1px solid rgba(233, 69, 96, 0.25);
                border-radius: 8px;
                color: #ef9a9a;
                font-size: 12px;
                margin-bottom: 12px;
            }
            .footer {
                padding: 12px 16px;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                text-align: center;
            }
            .footer-link {
                font-size: 11px;
                color: #666;
                text-decoration: none;
                transition: color 0.15s;
            }
            .footer-link:hover {
                color: #e94560;
            }
            .tracked-list::-webkit-scrollbar {
                width: 6px;
            }
            .tracked-list::-webkit-scrollbar-track {
                background: transparent;
            }
            .tracked-list::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
            }
            .tracked-list::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.2);
            }
            .hidden {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <span class="header-icon">🔍</span>
            <div class="header-text">
                <h1>ShopSpy</h1>
                <p>Отслеживание цен</p>
            </div>
        </div>
        <div class="main">
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <span>Загрузка...</span>
            </div>

            <div id="auth-section" class="section hidden">
                <div class="auth-prompt">
                    <div class="auth-prompt-icon">🔐</div>
                    <div class="auth-prompt-text">
                        Войдите через Telegram<br />для отслеживания товаров
                    </div>
                    <button class="btn btn-primary" id="login-btn">
                        <span>✈️</span> Войти через Telegram
                    </button>
                </div>
            </div>

            <div id="user-section" class="section hidden">
                <div class="user-card">
                    <img id="user-avatar" class="user-avatar" src="" alt="" />
                    <div class="user-info">
                        <div class="user-name" id="user-name">Username</div>
                        <div class="user-status">✓ Авторизован</div>
                    </div>
                    <button class="btn btn-secondary" id="logout-btn">
                        Выйти
                    </button>
                </div>
            </div>

            <div id="stats-section" class="section hidden">
                <div class="section-title">📊 Моя статистика</div>
                <div class="stats-card">
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value" id="stat-viewed">0</div>
                            <div class="stat-label">👁️ Просмотрено</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-tracked">0</div>
                            <div class="stat-label">🔔 Отслеживаю</div>
                        </div>
                    </div>
                    <div class="stats-saved">
                        <div class="stats-saved-value">
                            <span id="stat-saved">0</span> ₽
                        </div>
                        <div class="stats-saved-label">💰 Сэкономлено</div>
                    </div>
                    <div class="stats-best-deal hidden" id="best-deal-section">
                        <div class="stats-best-title">🏆 Лучшая находка</div>
                        <div class="stats-best-name" id="best-deal-name"></div>
                        <div
                            class="stats-best-saved"
                            id="best-deal-saved"
                        ></div>
                    </div>
                </div>
                <a
                    href="#"
                    id="miniapp-link"
                    class="btn btn-secondary"
                    target="_blank"
                    style="margin-top: 10px; width: 100%"
                >
                    📱 Открыть в Telegram
                </a>
            </div>

            <div id="error-container" class="hidden">
                <div class="error-msg" id="error-msg"></div>
            </div>


            <div id="tracked-section" class="section hidden">
                <div class="section-title">📦 Мои товары</div>
                <div id="tracked-list" class="tracked-list"></div>
                <div id="tracked-empty" class="empty-state hidden">
                    <div class="empty-state-icon">📭</div>
                    <div>Пока нет отслеживаемых товаров</div>
                </div>
            </div>
        </div>
        <div class="footer">
            <a href="#" id="dashboard-link" target="_blank" class="footer-link"
                >📊 Открыть дашборд</a
            >
        </div>
        <script src="../config.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
