<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header-icon { font-size: 28px; }
    .header-text h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header-text p { font-size: 11px; color: #888; margin-top: 2px; }

    .status {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.ok {
      background: rgba(76,175,80,0.12);
      border: 1px solid rgba(76,175,80,0.25);
      color: #81c784;
    }
    .status.error {
      background: rgba(233,69,96,0.12);
      border: 1px solid rgba(233,69,96,0.25);
      color: #ef9a9a;
    }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .status.ok .status-dot { background: #4caf50; }
    .status.error .status-dot { background: #e94560; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 700; color: #e94560; }
    .stat-label { font-size: 10px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    .link-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #ddd;
      font-size: 13px;
      text-decoration: none;
      text-align: center;
      transition: all 0.15s;
      margin-bottom: 8px;
    }
    .link-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .footer {
      font-size: 10px;
      color: #555;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🔍</span>
    <div class="header-text">
      <h1>ShopSpy</h1>
      <p>AI-помощник покупателя</p>
    </div>
  </div>

  <div id="status" class="status error">
    <span class="status-dot"></span>
    Проверяю бэкенд...
  </div>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-products">-</div>
      <div class="stat-label">Товаров</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-records">-</div>
      <div class="stat-label">Записей цен</div>
    </div>
  </div>

  <a href="https://shop-spy.onrender.com" target="_blank" class="link-btn">
    📊 Открыть дашборд
  </a>

  <div class="footer">
    Откройте любой товар на WB или Ozon -<br>
    ShopSpy автоматически соберет данные
  </div>

  <script>
    async function checkBackend() {
      const statusEl = document.getElementById('status');
      try {
        const resp = await fetch('https://shop-spy.onrender.com/api/stats');
        const data = await resp.json();
        statusEl.className = 'status ok';
        statusEl.innerHTML = '<span class="status-dot"></span> Сервер работает';
        document.getElementById('stat-products').textContent = data.unique_products || 0;
        document.getElementById('stat-records').textContent = data.total_records || 0;
      } catch (e) {
        statusEl.className = 'status error';
        statusEl.innerHTML = '<span class="status-dot"></span> Сервер просыпается... подождите 30 сек';
      }
    }
    checkBackend();
  </script>
</body>
</html>
