<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSpy — Статистика</title>
    <style>
      :root {
        --bg: #0f0f1a;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.12);
        --text: #eaeaf2;
        --muted: rgba(234, 234, 242, 0.7);
        --accent: #e94560;
        --ok: #4ade80;
        --warn: #fbbf24;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        padding: 16px 16px 10px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0));
      }
      .title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .title-badge {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        background: rgba(233, 69, 96, 0.18);
        border: 1px solid rgba(233, 69, 96, 0.35);
      }
      .subtitle {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      main { padding: 14px 16px 28px; }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }
      .card-title { font-size: 12px; color: var(--muted); }
      .card-value { margin-top: 6px; font-size: 18px; font-weight: 800; }
      .card-hint { margin-top: 4px; font-size: 11px; color: rgba(234, 234, 242, 0.55); }

      .section { margin-top: 14px; }
      .section h2 {
        margin: 0 0 10px;
        font-size: 14px;
        color: rgba(234, 234, 242, 0.92);
      }

      .list {
        display: grid;
        gap: 10px;
      }
      .item {
        background: var(--card2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }
      .item-top {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        justify-content: space-between;
      }
      .item-name {
        font-weight: 700;
        font-size: 13px;
        line-height: 1.2;
      }
      .pill {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: rgba(234, 234, 242, 0.85);
      }
      .pill.wb { background: rgba(192, 132, 252, 0.14); border-color: rgba(192,132,252,0.3); }
      .pill.ozon { background: rgba(56, 189, 248, 0.14); border-color: rgba(56,189,248,0.3); }

      .item-meta { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
      .item-meta b { color: rgba(234, 234, 242, 0.92); font-weight: 700; }

      .best {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(74, 222, 128, 0.10);
        border: 1px solid rgba(74, 222, 128, 0.22);
        color: rgba(234, 234, 242, 0.92);
        font-size: 12px;
      }

      .error {
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(233, 69, 96, 0.35);
        background: rgba(233, 69, 96, 0.14);
        font-size: 12px;
      }

      .loader {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(234,234,242,0.25);
        border-top-color: rgba(234,234,242,0.9);
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .foot {
        margin-top: 18px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: rgba(234,234,242,0.5);
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      a { color: #ff9aa8; text-decoration: none; }
    </style>
  </head>
  <body>
    <header>
      <div class="title">
        <div class="title-badge">🔍</div>
        <div>
          <div>ShopSpy — Статистика</div>
          <div class="subtitle" id="subtitle">Загружаю данные…</div>
        </div>
      </div>
    </header>

    <main>
      <div id="root">
        <div class="loader"><div class="spinner"></div> Подключение…</div>
      </div>

      <div class="foot">
        <span>Mini App</span>
        <span><a href="/docs" target="_blank">API Docs</a></span>
      </div>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
