<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ShopSpy — Mini App</title>
    <style>
      :root {
        --bg: #0a0a12;
        --surface: rgba(255, 255, 255, 0.03);
        --surface-hover: rgba(255, 255, 255, 0.06);
        --separator: rgba(255, 255, 255, 0.06);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.65);
        --text-tertiary: rgba(255, 255, 255, 0.4);
        --accent: #e94560;
        --accent-soft: rgba(233, 69, 96, 0.15);
        --success: #34d399;
        --success-soft: rgba(52, 211, 153, 0.12);
        --radius-lg: 24px;
        --radius-md: 18px;
        --radius-sm: 14px;
        --shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        --nav-height: 72px;
        --safe-bottom: env(safe-area-inset-bottom, 0);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        background: var(--bg);
        color: var(--text-primary);
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, sans-serif;
        line-height: 1.4;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
      }

      /* ── App shell ── */
      .app {
        max-width: 760px;
        margin: 0 auto;
        padding: 20px 16px calc(var(--nav-height) + 16px);
        position: relative;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ── Top bar ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-shrink: 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-icon {
        width: 44px;
        height: 44px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, #e94560, #c2185b);
        font-size: 22px;
        box-shadow: 0 6px 12px rgba(233, 69, 96, 0.2);
      }

      .brand-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.4px;
      }

      .brand-subtitle {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 2px;
        font-weight: 400;
      }

      /* ── Swipe container ── */
      .swipe-container {
        overflow: hidden;
        position: relative;
        flex: 1;
        touch-action: pan-y;
      }

      .swipe-track {
        display: flex;
        height: 100%;
        transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
        will-change: transform;
      }

      .swipe-track.swiping {
        transition: none;
      }

      .swipe-page {
        min-width: 100%;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-right: 2px;
        scrollbar-width: none;
      }

      .swipe-page::-webkit-scrollbar {
        display: none;
      }

      .view-content {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding-bottom: 8px;
      }

      /* ── Bottom navigation (clean) ── */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--nav-height);
        background: rgba(10, 10, 18, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding-bottom: var(--safe-bottom);
        border-top: 0.5px solid var(--separator);
      }

      .bottom-nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-around;
        width: 100%;
        max-width: 760px;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 14px;
        border: none;
        background: none;
        color: var(--text-tertiary);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.2px;
        cursor: pointer;
        transition: color 0.2s, transform 0.15s;
        -webkit-tap-highlight-color: transparent;
        border-radius: 30px;
      }

      .nav-item:active {
        transform: scale(0.92);
        background: var(--surface);
      }

      .nav-item.active {
        color: var(--accent);
      }

      .nav-icon {
        font-size: 24px;
        line-height: 1;
        margin-bottom: 2px;
      }

      /* ── Cards & surfaces (без рамок) ── */
      .hero {
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px 20px;
        box-shadow: var(--shadow);
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .hero-label {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 40px;
        background: var(--accent-soft);
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 12px;
      }

      .hero-title {
        font-size: 26px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.6px;
      }

      .hero-subtitle {
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.4;
      }

      .hero-icon {
        min-width: 52px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        background: var(--surface-hover);
        font-size: 26px;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 24px;
      }

      .hero-metric {
        padding: 16px;
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.02);
      }

      .hero-metric span {
        display: block;
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .hero-metric b {
        display: block;
        margin-top: 8px;
        font-size: 24px;
        font-weight: 700;
        color: var(--success);
      }

      /* Stats grid */
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .stat-card, .panel, .loader-card, .error-card {
        background: var(--surface);
        border-radius: var(--radius-md);
        padding: 18px 16px;
      }

      .stat-title {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 700;
        margin-top: 6px;
        letter-spacing: -0.5px;
      }

      .stat-value.accent {
        color: var(--success);
      }

      .stat-hint {
        margin-top: 6px;
        color: var(--text-tertiary);
        font-size: 12px;
      }

      /* Quick actions */
      .quick-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .quick-btn {
        background: var(--surface);
        color: var(--text-primary);
        border-radius: 60px;
        padding: 16px 10px;
        font-size: 14px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        border: none;
      }

      .quick-btn:active {
        transform: scale(0.96);
        background: var(--surface-hover);
      }

      /* Section headers */
      .section-title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.3px;
        margin-bottom: 4px;
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .section-note {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .best-card {
        margin-top: 12px;
        padding: 18px;
        border-radius: var(--radius-md);
        background: var(--success-soft);
      }

      .best-name {
        font-weight: 700;
        font-size: 16px;
      }

      .best-meta {
        margin-top: 6px;
        color: var(--text-secondary);
        font-size: 13px;
      }

      /* Product & Activity cards — clean */
      .product-card, .activity-card {
        background: var(--surface);
        border-radius: var(--radius-md);
        padding: 18px 16px;
        transition: background 0.15s;
      }

      .product-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .product-name {
        font-weight: 700;
        font-size: 15px;
        line-height: 1.3;
      }

      .pill {
        border-radius: 40px;
        background: var(--surface-hover);
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
        color: var(--text-secondary);
      }

      .pill.wb {
        background: rgba(192, 132, 252, 0.15);
        color: #c084fc;
      }

      .pill.ozon {
        background: rgba(56, 189, 248, 0.15);
        color: #38bdf8;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        margin-top: 12px;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .meta-row b {
        color: var(--text-primary);
        font-weight: 600;
      }

      .muted-row {
        color: var(--text-tertiary);
      }

      .money-positive {
        color: var(--success) !important;
      }

      .purchase-banner {
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: var(--radius-sm);
        background: var(--success-soft);
        font-size: 13px;
      }

      .purchase-banner span {
        color: var(--text-tertiary);
      }

      .card-actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }

      .action-btn, .save-btn, .link-btn, .icon-btn, .preset-btn {
        border: none;
        background: var(--surface-hover);
        color: var(--text-primary);
        border-radius: 60px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      .action-btn:active, .save-btn:active, .link-btn:active, .preset-btn:active {
        transform: scale(0.97);
      }

      .action-btn.primary, .save-btn {
        background: var(--accent);
        color: white;
        font-weight: 600;
      }

      .action-btn.primary:active, .save-btn:active {
        background: #d13e56;
      }

      .link-btn {
        background: transparent;
        color: var(--accent);
        padding: 8px 0;
      }

      .link-btn:active {
        background: transparent;
        opacity: 0.7;
      }

      .empty-state {
        padding: 32px 20px;
        border-radius: var(--radius-md);
        background: var(--surface);
        color: var(--text-tertiary);
        font-size: 14px;
        text-align: center;
      }

      /* Loader & Error */
      .loader-card {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        min-height: 140px;
        color: var(--text-secondary);
      }

      .spinner {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2.5px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .error-card {
        color: #ffdce2;
      }

      .error-detail {
        margin-top: 12px;
        color: rgba(255, 220, 226, 0.7);
        white-space: pre-wrap;
        font-size: 13px;
      }

      /* Modal (clean) */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 16px;
        z-index: 200;
      }

      .modal-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-sheet {
        width: 100%;
        max-width: 760px;
        background: #181824;
        border-radius: 28px 28px 20px 20px;
        padding: 24px 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        transform: translateY(20px);
        transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      }

      .modal-overlay.open .modal-sheet {
        transform: translateY(0);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .icon-btn {
        width: 44px;
        height: 44px;
        border-radius: 30px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface);
        font-size: 20px;
      }

      .input-group {
        margin-top: 20px;
      }

      .input-group label {
        display: block;
        margin-bottom: 10px;
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .preset-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .preset-btn {
        text-align: left;
        font-weight: 500;
        background: var(--surface);
        border-radius: 40px;
      }

      .preset-btn.active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .preset-btn:disabled {
        opacity: 0.4;
      }

      .text-input {
        width: 100%;
        border-radius: 40px;
        border: none;
        background: var(--surface);
        color: var(--text-primary);
        padding: 16px 18px;
        font-size: 16px;
        outline: none;
        transition: box-shadow 0.2s;
      }

      .text-input:focus {
        box-shadow: 0 0 0 2px var(--accent-soft);
      }

      .purchase-summary {
        margin-top: 20px;
        padding: 18px;
        border-radius: var(--radius-md);
        background: var(--surface);
        font-size: 13px;
        color: var(--text-secondary);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .purchase-summary b {
        color: var(--text-primary);
      }

      .form-error {
        margin-top: 16px;
        padding: 14px;
        border-radius: 40px;
        background: rgba(233, 69, 96, 0.12);
        color: #ffb3bf;
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      .save-btn {
        margin-top: 24px;
        width: 100%;
        padding: 18px;
        font-size: 16px;
        border-radius: 60px;
      }

      @media (min-width: 640px) {
        .preset-row {
          grid-template-columns: 1fr 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="brand-icon">🔍</div>
          <div>
            <div class="brand-title">ShopSpy</div>
            <div class="brand-subtitle" id="subtitle">Подключаюсь…</div>
          </div>
        </div>
      </div>

      <div id="root" style="flex:1; display:flex; flex-direction:column;">
        <div class="loader-card"><div class="spinner"></div><div>Загружаю Mini App…</div></div>
      </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav" style="display:none">
      <div class="bottom-nav-inner">
        <button class="nav-item active" data-nav="overview">
          <span class="nav-icon">📊</span>
          <span>Обзор</span>
        </button>
        <button class="nav-item" data-nav="products">
          <span class="nav-icon">🛍</span>
          <span>Товары</span>
        </button>
        <button class="nav-item" data-nav="purchases">
          <span class="nav-icon">✅</span>
          <span>Покупки</span>
        </button>
        <button class="nav-item" data-nav="activity">
          <span class="nav-icon">📈</span>
          <span>Активность</span>
        </button>
      </div>
    </nav>

    <div class="modal-overlay" id="purchase-modal">
      <div class="modal-sheet" id="purchase-modal-content"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
