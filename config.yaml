# ═══════════════════════════════════════════════════════════════
# ShopSpy — Единый конфигурационный файл
# ═══════════════════════════════════════════════════════════════
# Все настройки в одном месте. Секреты читаются из .env

# ───────────────────────────────────────────────────────────────
# Окружение
# ───────────────────────────────────────────────────────────────
environment: development # development | production | testing

# ───────────────────────────────────────────────────────────────
# Сервер
# ───────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "*"

# ───────────────────────────────────────────────────────────────
# База данных
# ───────────────────────────────────────────────────────────────
database:
  path: "data/shopspy.db" # относительный путь от корня проекта

# ───────────────────────────────────────────────────────────────
# Telegram Bot
# ───────────────────────────────────────────────────────────────
telegram:
  bot_token: ${oc.env:TELEGRAM_BOT_TOKEN,''} # секрет из .env

# ───────────────────────────────────────────────────────────────
# Admin Panel
# ───────────────────────────────────────────────────────────────
admin:
  secret: ${oc.env:ADMIN_SECRET,''} # если задан — защищает /api/admin/*

# ───────────────────────────────────────────────────────────────
# AI провайдеры (Gemini — бесплатно, Claude — платно)
# ───────────────────────────────────────────────────────────────
ai:
  # Приоритет: gemini > claude
  gemini:
    api_key: ${oc.env:GEMINI_API_KEY,''}
    model: ${oc.env:GEMINI_MODEL,''}
    max_tokens: 4000
    temperature: 0.3
  claude:
    api_key: ${oc.env:ANTHROPIC_API_KEY,''}
    model: "claude-3-haiku-20240307"
    max_tokens: 2000

# ───────────────────────────────────────────────────────────────
# Rate Limiting (защита от злоупотребления AI)
# ───────────────────────────────────────────────────────────────
rate_limit:
  per_ip: 10 # запросов в день с одного IP
  global: 200   # всего запросов в день

# ───────────────────────────────────────────────────────────────
# Анализ цен (пороги для вердиктов)
# ───────────────────────────────────────────────────────────────
price_analysis:
  good_deal_threshold: 0.85 # цена ≤ 85% от средней = good_deal
  overpriced_threshold: 1.10 # цена ≥ 110% от средней = overpriced
  fake_discount_threshold: 0.30 # заявленная скидка ≥ 30% = проверка
  min_price_margin: 0.05 # 5% от минимума — всё ещё good_deal
  max_price_margin: 0.95 # 95% от максимума — уже overpriced
  notify_drop_percent: 5 # уведомлять при падении ≥ 5%
  notify_rise_percent: 10 # уведомлять при росте ≥ 10%

# ───────────────────────────────────────────────────────────────
# Репозиторий цен
# ───────────────────────────────────────────────────────────────
prices:
  equality_threshold: 0.01 # разница < 1 копейки = одинаковые цены
  min_record_interval_hours: 6 # не записывать одинаковую цену чаще

# ───────────────────────────────────────────────────────────────
# Статистика пользователей
# ───────────────────────────────────────────────────────────────
user_stats:
  view_dedup_days: 1 # не записывать повторный просмотр 1 день

# ───────────────────────────────────────────────────────────────
# Cleanup (очистка старых данных)
# ───────────────────────────────────────────────────────────────
cleanup:
  interval_hours: 24 # запускать cleanup каждые 24 часа
  keep_days: 365 # хранить данные 1 год

# ───────────────────────────────────────────────────────────────
# API настройки
# ───────────────────────────────────────────────────────────────
api:
  history_limit_default: 30 # лимит истории по умолчанию
  history_limit_max: 100 # максимальный лимит истории
  products_limit_default: 50 # лимит списка товаров
  products_limit_max: 200 # максимальный лимит
  recent_items_limit: 20 # лимит для "последних" записей в админке
