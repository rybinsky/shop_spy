services:
  - type: web
    name: shopspy
    runtime: docker
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.main
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 8000
    plan: free
